---
- name: Minimal LAMP Setup
  hosts: localhost         # 自分自身（Ubuntu Server）に対して実行
  become: true             # sudo 権限を使用

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Apache, MariaDB, and PHP
      apt:
        name:
          - apache2
          - mariadb-server
          - php
          - libapache2-mod-php
          - php-mysql
        state: present

    - name: Ensure Apache is running
      service:
        name: apache2
        state: started
        enabled: yes

    - name: Create a basic PHP info page
      copy:
        dest: /var/www/html/info.php
        content: "<?php phpinfo(); ?>"